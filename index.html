<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FalaK - Mobile Masterpiece</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        
        html, body { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: #020203; color: #fff; font-family: 'Segoe UI', sans-serif; 
        }
        
        #gameWrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        canvas { background-color: #060608; display: block; }
        
        .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        .warp-glow { box-shadow: inset 0 0 50px rgba(157, 0, 255, 0.4) !important; }
        @keyframes shake { 10%,90%{transform:translate3d(-2px,0,0)} 20%,80%{transform:translate3d(4px,0,0)} 30%,50%,70%{transform:translate3d(-6px,0,0)} 40%,60%{transform:translate3d(6px,0,0)} }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 2, 3, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(10px); z-index: 30; padding: 20px; text-align: center; }
        .hidden { display: none !important; }
        
        h1.title { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; letter-spacing: 5px; font-weight: 900; color: #F6B93B; text-shadow: 0px 5px 20px rgba(246, 185, 59, 0.6); margin-bottom: 5px; }
        .quote { color: #00E5FF; letter-spacing: 2px; font-size: 0.75rem; margin-bottom: 25px; font-family: 'Orbitron'; opacity: 0.9; text-shadow: 0 0 10px rgba(0,229,255,0.4); }

        input[type="text"] { background: rgba(255,255,255,0.05); border: 1px solid #444; color: #F6B93B; font-family: 'Orbitron'; padding: 10px; font-size: 1.1rem; border-radius: 5px; text-align: center; outline: none; margin-bottom: 15px; width: 100%; max-width: 300px; text-transform: uppercase; }
        
        .btn { background: transparent; border: 2px solid #F6B93B; color: #F6B93B; padding: 12px 25px; font-size: 1.1rem; font-family: 'Orbitron'; cursor: pointer; border-radius: 5px; transition: 0.3s; font-weight: bold; width: 100%; max-width: 300px; margin-bottom: 10px; }
        .btn:active { background: #F6B93B; color: #000; box-shadow: 0 0 20px #F6B93B; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 300px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.02); border: 1px solid #222; padding: 10px; border-radius: 5px; text-align: center; }
        .stat-label { font-size: 0.65rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-family: 'Orbitron'; font-size: 1.5rem; color: #00E5FF; font-weight: bold; margin-top: 5px; }
        
        .diff-selector { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; width: 100%; max-width: 320px; }
        .diff-btn { background: #111; border: 1px solid #444; color: #888; padding: 8px 12px; font-family: 'Orbitron'; cursor: pointer; border-radius: 4px; font-size: 0.8rem; flex-grow: 1; }
        .diff-btn.active { background: #00E5FF; color: #000; border-color: #00E5FF; box-shadow: 0 0 10px rgba(0, 229, 255, 0.5); font-weight: bold; }

        #hud { position: absolute; top: 15px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 10; }
        .hud-score { font-family: 'Orbitron'; font-size: 2.8rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.5); line-height: 1; }
        #comboText { font-family: 'Orbitron'; font-size: 1rem; color: #F6B93B; font-weight: bold; text-shadow: 0 0 10px #F6B93B; margin-top: 5px; }
        
        #focusContainer { width: 120px; height: 6px; background: #222; border-radius: 3px; margin-top: 5px; border: 1px solid #444; overflow: hidden; float: right;}
        #focusBar { width: 100%; height: 100%; background: #00E5FF; box-shadow: 0 0 10px #00E5FF; transition: width 0.1s; }
        #statusIndicator { font-family: 'Orbitron'; font-size: 0.9rem; margin-bottom: 5px; display: none; font-weight: bold; text-align: right; }
        
        /* TOUCH ZONES */
        #touchLeft { position: absolute; top: 0; left: 0; width: 50%; height: 100%; z-index: 5; }
        #touchRight { position: absolute; top: 0; right: 0; width: 50%; height: 100%; z-index: 5; }
        
        /* FOCUS BUTTON */
        #focusBtn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 200px; padding: 15px; background: rgba(0, 229, 255, 0.1); border: 2px solid #00E5FF; color: #00E5FF; font-family: 'Orbitron'; font-weight: bold; font-size: 1.1rem; border-radius: 30px; text-align: center; z-index: 25; box-shadow: 0 0 15px rgba(0,229,255,0.2); backdrop-filter: blur(5px); user-select: none; -webkit-user-select: none; }
        #focusBtn:active { background: #00E5FF; color: #000; box-shadow: 0 0 25px #00E5FF; }

        .instructions { font-size: 0.75rem; color: #aaa; margin-top: 20px; line-height: 1.8; text-align: center; }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="gameWrapper">
        <canvas id="gameCanvas"></canvas>
        
        <div id="touchLeft"></div>
        <div id="touchRight"></div>
        <div id="focusBtn" class="hidden">HOLD TO FOCUS</div>

        <div id="hud" class="hidden">
            <div>
                <div class="hud-score" id="inGameScore">0</div>
                <div id="comboText"></div>
            </div>
            <div>
                <div id="statusIndicator">STATUS</div>
                <div style="font-family: 'Orbitron'; font-size: 0.6rem; color: #00E5FF; margin-top:5px; text-align: right; letter-spacing: 1px;">FOCUS METER</div>
                <div id="focusContainer"><div id="focusBar"></div></div>
            </div>
        </div>

        <div id="mainMenu" class="overlay">
            <h1 class="title">FalaK</h1>
            <div class="quote">"EMBRACE THE VOID. ASCEND BEYOND."</div>
            
            <input type="text" id="playerName" placeholder="CALLSIGN" maxlength="12">
            
            <div class="dashboard-grid">
                <div class="stat-box"><div class="stat-label">Best</div><div class="stat-value" id="dashHighScore">0</div></div>
                <div class="stat-box"><div class="stat-label">Runs</div><div class="stat-value" id="dashGames">0</div></div>
            </div>

            <div class="diff-selector" id="difficultySelector">
                <button class="diff-btn" data-diff="easy">EASY</button>
                <button class="diff-btn active" data-diff="medium">MID</button>
                <button class="diff-btn" data-diff="difficult">HARD</button>
                <button class="diff-btn" data-diff="hard">EXTREME</button>
            </div>

            <button class="btn" id="startBtn">INITIALIZE</button>
            
            <div class="instructions">
                <span class="highlight">TAP RIGHT HALF:</span> Fly<br>
                <span class="highlight">TAP LEFT HALF:</span> Switch Color<br>
                <span style="color:#F6B93B;">🟡 +5</span> | ⚪ Invincible | <span style="color:#9D00FF;">🟣 Warp</span>
            </div>
        </div>

        <div id="gameOverScreen" class="overlay hidden">
            <h2 style="font-size: 3rem; color: #ff3366; font-family: 'Orbitron'; text-shadow: 0 0 25px rgba(255,51,102,0.6);">SIGNAL LOST</h2>
            <div class="dashboard-grid" style="margin-top: 25px;">
                <div class="stat-box"><div class="stat-label">Score</div><div class="stat-value" style="color: #fff;" id="goScore">0</div></div>
                <div class="stat-box"><div class="stat-label">Best</div><div class="stat-value" id="goHighScore">0</div></div>
            </div>
            <button class="btn" id="retryBtn" style="margin-top: 10px;">RETRY</button>
            <button class="btn" id="menuBtn" style="background: #111; border-color: #444; color: #fff;">MAIN MENU</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameWrapper = document.getElementById('gameWrapper');
        
        function resize() {
            gameWrapper.style.width = window.innerWidth + 'px';
            gameWrapper.style.height = window.innerHeight + 'px';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if(player) player.x = canvas.width * 0.25; 
        }
        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => setTimeout(resize, 100));

        const ui = {
            mainMenu: document.getElementById('mainMenu'), gameOver: document.getElementById('gameOverScreen'),
            hud: document.getElementById('hud'), inGameScore: document.getElementById('inGameScore'),
            comboText: document.getElementById('comboText'), focusBar: document.getElementById('focusBar'), 
            statusIndicator: document.getElementById('statusIndicator'),
            playerNameInput: document.getElementById('playerName'), dashHighScore: document.getElementById('dashHighScore'),
            dashGames: document.getElementById('dashGames'), startBtn: document.getElementById('startBtn'),
            retryBtn: document.getElementById('retryBtn'), menuBtn: document.getElementById('menuBtn'),
            goScore: document.getElementById('goScore'), goHighScore: document.getElementById('goHighScore'),
            diffBtns: document.querySelectorAll('.diff-btn'), focusBtn: document.getElementById('focusBtn'),
            touchLeft: document.getElementById('touchLeft'), touchRight: document.getElementById('touchRight')
        };

        const audio = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if(this.ctx.state === 'suspended') this.ctx.resume(); },
            play(type) {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator(), gain = this.ctx.createGain(), now = this.ctx.currentTime;
                osc.connect(gain); gain.connect(this.ctx.destination);
                
                if(type === 'flap') { osc.type = 'square'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(350, now + 0.1); gain.gain.setValueAtTime(0.04, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(now); osc.stop(now + 0.1); }
                else if(type === 'score') { osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.setValueAtTime(1200, now + 0.05); gain.gain.setValueAtTime(0.08, now); gain.gain.linearRampToValueAtTime(0, now + 0.1); osc.start(now); osc.stop(now + 0.1); }
                else if(type === 'perfect') { osc.type = 'triangle'; osc.frequency.setValueAtTime(600, now); osc.frequency.linearRampToValueAtTime(1200, now+0.1); osc.frequency.linearRampToValueAtTime(1800, now+0.2); gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now+0.2); osc.start(now); osc.stop(now+0.2); }
                else if(type === 'powerup') { osc.type = 'square'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(800, now+0.2); gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now+0.3); osc.start(now); osc.stop(now+0.3); }
                else if(type === 'warp') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(1500, now+0.5); gain.gain.setValueAtTime(0.15, now); gain.gain.linearRampToValueAtTime(0, now+0.5); osc.start(now); osc.stop(now+0.5); }
                else if(type === 'crash') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(20, now+0.5); gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now+0.5); osc.start(now); osc.stop(now+0.5); }
                else if(type === 'start') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.4); gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.15, now + 0.1); gain.gain.linearRampToValueAtTime(0, now + 0.6); osc.start(now); osc.stop(now + 0.6); }
                else if(type === 'focusOn') { osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.3); gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.4); osc.start(now); osc.stop(now + 0.4); }
                else if(type === 'focusOff') { osc.type = 'triangle'; osc.frequency.setValueAtTime(80, now); osc.frequency.exponentialRampToValueAtTime(400, now + 0.2); gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3); osc.start(now); osc.stop(now + 0.3); }
            }
        };

        const COLOR_1 = '#00E5FF'; const COLOR_2 = '#FF007F'; 
        
        const difficulties = {
            easy: { speed: 3.5, gap: 200, gravity: 0.35, spawnRate: 110, moveWalls: false, glitchChance: 0.0 },
            medium: { speed: 4.5, gap: 170, gravity: 0.4, spawnRate: 90, moveWalls: false, glitchChance: 0.1 },
            difficult: { speed: 5.5, gap: 150, gravity: 0.45, spawnRate: 80, moveWalls: false, glitchChance: 0.25 },
            hard: { speed: 6.5, gap: 130, gravity: 0.5, spawnRate: 70, moveWalls: true, glitchChance: 0.4 }
        };

        let currentDiff = 'medium';
        let config = { ...difficulties[currentDiff], baseSpeed: difficulties[currentDiff].speed };
        let gameActive = false, score = 0, frames = 0, combo = 0;
        
        let focusMeter = 100, isFocusing = false;
        let isWarp = false, warpTimer = 0;
        let shieldActive = false, shieldTimer = 0;

        let userProfile = { name: '', highScore: 0, gamesPlayed: 0 };
        function loadProfile() { try { const saved = localStorage.getItem('falak_mobile'); if(saved) userProfile = JSON.parse(saved); if(userProfile.name) ui.playerNameInput.value = userProfile.name; updateUI(); } catch(e){} }
        function saveProfile() { try { userProfile.name = ui.playerNameInput.value.trim() || 'Guest'; localStorage.setItem('falak_mobile', JSON.stringify(userProfile)); updateUI(); } catch(e){} }
        function updateUI() { ui.dashHighScore.innerText = userProfile.highScore; ui.dashGames.innerText = userProfile.gamesPlayed; }

        let floatingTexts = [];
        function addText(x, y, text, color) { floatingTexts.push({x, y, text, color, life: 1.0}); }

        const player = {
            x: 0, y: 300, radius: 10, velocity: 0, color: COLOR_1, trail: [], 
            draw() {
                if(!gameActive) return; 
                this.trail.forEach((t, i) => { ctx.globalAlpha = (i/this.trail.length)*0.5; ctx.beginPath(); ctx.arc(t.x, t.y, this.radius*(i/this.trail.length), 0, Math.PI*2); ctx.fillStyle = this.color; ctx.fill(); });
                ctx.globalAlpha = 1.0; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = this.color; ctx.stroke();
                
                if(shieldActive || isWarp) {
                    ctx.shadowBlur = 20; ctx.shadowColor = isWarp ? '#9D00FF' : '#fff'; 
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + 5, 0, Math.PI*2); 
                    ctx.strokeStyle = isWarp ? '#9D00FF' : 'rgba(255,255,255,0.8)'; ctx.lineWidth = 2; ctx.stroke(); ctx.shadowBlur = 0;
                } else {
                    ctx.shadowBlur = isFocusing ? 20 : 15; ctx.shadowColor = isFocusing ? '#fff' : this.color; ctx.fill(); ctx.shadowBlur = 0;
                }
            },
            update() {
                let currentGravity = isFocusing ? config.gravity * 0.3 : config.gravity;
                this.velocity += currentGravity; this.y += this.velocity;
                this.trail.push({x: this.x, y: this.y}); if (this.trail.length > (isFocusing || isWarp ? 20 : 12)) this.trail.shift();
                if (this.y + this.radius >= canvas.height || this.y - this.radius <= 0) triggerGameOver();

                if(shieldActive) { shieldTimer--; if(shieldTimer <= 0) { shieldActive = false; if(!isWarp) ui.statusIndicator.style.display = 'none'; } }
                if(isWarp) { 
                    warpTimer--; 
                    if(warpTimer <= 0) { isWarp = false; config.speed = config.baseSpeed; if(!shieldActive) ui.statusIndicator.style.display = 'none'; canvas.classList.remove('warp-glow'); } 
                }
            },
            flap() { this.velocity = isFocusing ? -3.5 : -7.5; audio.play('flap'); },
            switchColor() { this.color = (this.color === COLOR_1) ? COLOR_2 : COLOR_1; }
        };

        const objects = {
            walls: [], powerups: [], width: 45,
            draw() {
                this.walls.forEach(wall => {
                    ctx.fillStyle = wall.topColor; ctx.globalAlpha = isWarp ? 0.3 : 0.9; ctx.fillRect(wall.x, 0, this.width, wall.topHeight);
                    ctx.fillStyle = wall.bottomColor; ctx.fillRect(wall.x, wall.bottomY, this.width, canvas.height - wall.bottomY);
                    ctx.globalAlpha = 1.0; ctx.fillStyle = '#fff'; ctx.fillRect(wall.x, wall.topHeight - 3, this.width, 3); ctx.fillRect(wall.x, wall.bottomY, this.width, 3);
                });
                this.powerups.forEach(p => {
                    if(p.collected) return;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI*2);
                    if(p.type === 'score') ctx.fillStyle = '#F6B93B';
                    else if(p.type === 'shield') ctx.fillStyle = '#fff';
                    else if(p.type === 'warp') ctx.fillStyle = '#9D00FF';
                    ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle; ctx.fill(); ctx.shadowBlur = 0;
                });
            },
            update() {
                let currentSpeed = isFocusing ? config.speed * 0.3 : config.speed;
                let currentSpawnRate = Math.floor(config.spawnRate / (isFocusing ? 0.3 : (isWarp ? 2 : 1)));

                if (frames % Math.max(30, currentSpawnRate) === 0) {
                    let gap = Math.max(100, config.gap - Math.floor(score/20)*5); 
                    let gapPosition = Math.random() * (canvas.height - gap - 150) + 75;
                    let isGlitch = Math.random() < config.glitchChance && score > 10;

                    this.walls.push({ x: canvas.width, topHeight: gapPosition, bottomY: gapPosition + gap, topColor: Math.random() > 0.5 ? COLOR_1 : COLOR_2, bottomColor: Math.random() > 0.5 ? COLOR_1 : COLOR_2, passed: false, isGlitch: isGlitch, moveDir: Math.random() > 0.5 ? 1 : -1 });
                    
                    if(!isWarp && Math.random() < 0.20) {
                        let pType = Math.random();
                        let type = pType > 0.6 ? 'score' : (pType > 0.2 ? 'shield' : 'warp');
                        this.powerups.push({ x: canvas.width + this.width/2, y: gapPosition + gap/2, type: type, collected: false });
                    }
                }

                this.walls.forEach((wall, index) => {
                    wall.x -= currentSpeed;
                    if(config.moveWalls) { wall.topHeight += 1.5 * wall.moveDir; wall.bottomY += 1.5 * wall.moveDir; if(wall.topHeight < 30 || wall.bottomY > canvas.height - 30) wall.moveDir *= -1; }
                    if(wall.isGlitch && frames % 15 === 0) { wall.topColor = wall.topColor === COLOR_1 ? COLOR_2 : COLOR_1; wall.bottomColor = wall.bottomColor === COLOR_1 ? COLOR_2 : COLOR_1; }

                    let gapCenter = wall.topHeight + (wall.bottomY - wall.topHeight)/2;

                    if (player.x + player.radius > wall.x && player.x - player.radius < wall.x + this.width) {
                        if (!shieldActive && !isWarp) {
                            if (player.y - player.radius < wall.topHeight && player.color !== wall.topColor) triggerGameOver();
                            if (player.y + player.radius > wall.bottomY && player.color !== wall.bottomColor) triggerGameOver();
                        }
                    }

                    if (wall.x + this.width < player.x && !wall.passed) {
                        wall.passed = true;
                        if(!isWarp && Math.abs(player.y - gapCenter) < 25) { 
                            combo++; score += 2; focusMeter = Math.min(100, focusMeter + 20); audio.play('perfect');
                            addText(player.x, player.y - 20, "PERFECT!", "#F6B93B"); ui.comboText.innerText = combo > 1 ? `${combo}x COMBO` : '';
                        } else {
                            combo = 0; score++; audio.play('score'); addText(player.x, player.y - 20, "+1", "#fff"); ui.comboText.innerText = '';
                        }
                        ui.inGameScore.innerText = score;
                        
                        if (score % 10 === 0 && !isWarp) { config.baseSpeed += 0.2; config.speed = config.baseSpeed; } 
                    }
                    if (wall.x + this.width < 0) this.walls.splice(index, 1);
                });

                this.powerups.forEach((p, index) => {
                    p.x -= currentSpeed;
                    if(!p.collected && Math.hypot(player.x - p.x, player.y - p.y) < player.radius + 15) {
                        p.collected = true; 
                        if(p.type === 'score') { score += 5; ui.inGameScore.innerText = score; addText(player.x, player.y-20, "+5!", "#F6B93B"); audio.play('powerup'); }
                        else if(p.type === 'shield') { shieldActive = true; shieldTimer = 300; ui.statusIndicator.innerText = "SHIELD ACTIVE"; ui.statusIndicator.style.color = "#fff"; ui.statusIndicator.style.display = 'block'; audio.play('powerup'); }
                        else if(p.type === 'warp') { 
                            isWarp = true; if(isFocusing) { isFocusing = false; audio.play('focusOff'); }
                            warpTimer = 250; config.baseSpeed = config.speed; config.speed *= 2.5; 
                            ui.statusIndicator.innerText = "WARP SPEED!"; ui.statusIndicator.style.color = "#9D00FF"; ui.statusIndicator.style.display = 'block';
                            canvas.classList.add('warp-glow'); audio.play('warp');
                        }
                    }
                    if (p.x < -20) this.powerups.splice(index, 1);
                });
            }
        };

        const stars = Array.from({length: 40}, () => ({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, size: Math.random() * 1.5, speed: Math.random() * 1 + 0.1 }));
        
        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let bgLight = Math.min(0.15, score / 500); ctx.fillStyle = `rgba(0, 229, 255, ${bgLight})`; ctx.fillRect(0,0,canvas.width,canvas.height);
            
            ctx.fillStyle = '#fff';
            stars.forEach(star => {
                ctx.globalAlpha = star.size; 
                if(isWarp) { ctx.beginPath(); ctx.moveTo(star.x, star.y); ctx.lineTo(star.x + 40, star.y); ctx.strokeStyle = '#fff'; ctx.lineWidth = star.size; ctx.stroke(); }
                else { ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fill(); }
                if(gameActive) star.x -= star.speed * ((isFocusing ? config.speed*0.3 : config.speed) / 3); 
                if (star.x < 0) star.x = canvas.width;
            });
            ctx.globalAlpha = 1.0;
        }

        let particles = [];
        function triggerGameOver() {
            gameActive = false; audio.play('crash'); ui.focusBtn.classList.add('hidden');
            canvas.classList.add('shake'); setTimeout(() => canvas.classList.remove('shake'), 300);
            for(let i=0; i<30; i++) particles.push({ x: player.x, y: player.y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1.0, color: player.color });
            
            userProfile.gamesPlayed++; if(score > userProfile.highScore) userProfile.highScore = score; saveProfile();
            setTimeout(() => { ui.hud.classList.add('hidden'); ui.gameOver.classList.remove('hidden'); ui.goScore.innerText = score; ui.goHighScore.innerText = userProfile.highScore; }, 1000);
        }

        function loop() {
            if(gameActive) {
                if(isFocusing && !isWarp) { focusMeter -= 0.5; if(focusMeter <= 0) { isFocusing = false; focusMeter = 0; audio.play('focusOff'); } }
                ui.focusBar.style.width = focusMeter + "%"; ui.focusBar.style.background = isFocusing ? "#fff" : "#00E5FF"; ui.focusBar.style.boxShadow = isFocusing ? "0 0 10px #fff" : "0 0 5px #00E5FF";
                objects.update(); player.update(); frames++;
            }
            
            drawBackground(); 
            objects.draw();

            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.04;
                if(p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            for(let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i]; ft.y -= 1; ft.life -= 0.03;
                if(ft.life <= 0) { floatingTexts.splice(i, 1); continue; }
                ctx.globalAlpha = ft.life; ctx.fillStyle = ft.color; ctx.font = "bold 16px Orbitron"; ctx.fillText(ft.text, ft.x - 10, ft.y); ctx.globalAlpha = 1.0;
            }

            if(gameActive) player.draw();
            requestAnimationFrame(loop);
        }

        function startGame() {
            audio.init(); audio.play('start'); saveProfile(); resize();
            config = { ...difficulties[currentDiff], baseSpeed: difficulties[currentDiff].speed };
            gameActive = true; isFocusing = false; focusMeter = 100; isWarp = false; shieldActive = false;
            player.y = canvas.height / 2; player.velocity = 0; player.trail = []; player.color = COLOR_1; canvas.classList.remove('warp-glow');
            particles = []; floatingTexts = []; objects.walls = []; objects.powerups = []; score = 0; frames = 0; combo = 0;
            ui.inGameScore.innerText = score; ui.comboText.innerText = ""; ui.statusIndicator.style.display = 'none';
            ui.mainMenu.classList.add('hidden'); ui.gameOver.classList.add('hidden'); ui.hud.classList.remove('hidden'); ui.focusBtn.classList.remove('hidden');
        }

        ui.diffBtns.forEach(btn => { btn.addEventListener('click', (e) => { ui.diffBtns.forEach(b => b.classList.remove('active')); e.target.classList.add('active'); currentDiff = e.target.dataset.diff; }); });

        // MOBILE TOUCH CONTROLS
        ui.touchRight.addEventListener('touchstart', (e) => { e.preventDefault(); if(gameActive) player.flap(); });
        ui.touchLeft.addEventListener('touchstart', (e) => { e.preventDefault(); if(gameActive) player.switchColor(); });
        ui.focusBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if(gameActive && focusMeter > 0 && !isWarp) { isFocusing = true; audio.play('focusOn'); } });
        ui.focusBtn.addEventListener('touchend', (e) => { e.preventDefault(); if(isFocusing) audio.play('focusOff'); isFocusing = false; });
        
        let keys = {};
        window.addEventListener('keydown', (e) => {
            if(!ui.mainMenu.classList.contains('hidden')) return;
            if (e.code === 'Space') { e.preventDefault(); if(gameActive) player.flap(); else if(!ui.gameOver.classList.contains('hidden')) startGame(); }
            if ((e.code === 'ShiftLeft' || e.code === 'ShiftRight') && gameActive) player.switchColor();
            if (e.code === 'KeyF' && gameActive && focusMeter > 0 && !keys['KeyF'] && !isWarp) { isFocusing = true; keys['KeyF'] = true; audio.play('focusOn'); }
        });
        window.addEventListener('keyup', (e) => { if (e.code === 'KeyF') { if(isFocusing) audio.play('focusOff'); isFocusing = false; keys['KeyF'] = false; } });

        ui.startBtn.addEventListener('click', startGame); ui.retryBtn.addEventListener('click', startGame);
        ui.menuBtn.addEventListener('click', () => { ui.gameOver.classList.add('hidden'); ui.mainMenu.classList.remove('hidden'); updateUI(); });

        resize(); loadProfile(); loop();
    </script>
</body>
</html>
